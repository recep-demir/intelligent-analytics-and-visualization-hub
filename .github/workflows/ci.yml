name: CI Build Check

on:
  push:
    branches: [ main, development ]
    paths-ignore:
      - 'README.md'
      - '**.md'
      - '.github/pull_request_template.md'

  pull_request:
    branches: [ main, development ]
    paths-ignore:
      - 'README.md'
      - '**.md'
      - '.github/pull_request_template.md'

jobs:
  validate-code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Run TypeScript check (backend)
      run: |
        cd backend
        npm run typecheck

    - name: Install shared dependencies
      run: |
        cd shared
        npm install

    - name: Run TypeScript check (shared)
      run: |
        cd shared
        npm run typecheck
