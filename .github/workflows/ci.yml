name: CI Build Check

on:
  push:
    branches: [ main, development ]
    paths-ignore:
      - 'README.md'
      - '**.md'
      - '.github/pull_request_template.md'

  pull_request:
    branches: [ main, development ]
    paths-ignore:
      - 'README.md'
      - '**.md'
      - '.github/pull_request_template.md'

jobs:
  validate-code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
